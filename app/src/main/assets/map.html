<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #192231; }
  #map { width: 100%; height: 100%; }
  .leaflet-control-zoom { display: none; }
  .leaflet-control-attribution { display: none; }
  .traffic-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #4caf50, #ffaa00, #ff4444);
    transition: opacity 0.3s; z-index: 1000;
  }
</style>
</head>
<body>
<div id="map"></div>
<div id="trafficBar" class="traffic-bar" style="opacity:0"></div>
<script>
  const map = L.map('map', {
    center: [37.7749, -122.4194],
    zoom: 15,
    zoomControl: false,
    dragging: true,
    scrollWheelZoom: false,
    doubleClickZoom: false,
    keyboard: false,
  });

  let isNightMode = true;
  let trafficVisible = false;

  const nightTile = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    attribution: '&copy; CARTO',
  }).addTo(map);

  const dayTile = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    attribution: '&copy; CARTO',
  });

  const userIcon = L.divIcon({
    html: '<div style="width:16px;height:16px;background:#3b82f6;border-radius:50%;border:3px solid rgba(59,130,246,0.5);box-shadow:0 0 20px rgba(59,130,246,0.6);"></div>',
    iconSize: [16, 16],
    iconAnchor: [8, 8],
    className: '',
  });

  const destIcon = L.divIcon({
    html: '<div style="width:12px;height:12px;background:#ef4444;border-radius:50%;border:2px solid rgba(239,68,68,0.4);box-shadow:0 0 12px rgba(239,68,68,0.4);"></div>',
    iconSize: [12, 12],
    iconAnchor: [6, 6],
    className: '',
  });

  let userMarker = null;
  let destMarker = null;

  function updateLocation(lat, lng) {
    if (userMarker) {
      userMarker.setLatLng([lat, lng]);
    } else {
      userMarker = L.marker([lat, lng], { icon: userIcon }).addTo(map);
    }
    map.panTo([lat, lng], { animate: true, duration: 0.5 });
  }

  function setDestination(lat, lng, label) {
    if (destMarker) {
      destMarker.setLatLng([lat, lng]);
    } else {
      destMarker = L.marker([lat, lng], { icon: destIcon }).addTo(map);
    }
    if (label) {
      destMarker.bindTooltip(label, { permanent: true, direction: 'top', offset: [0, -8] });
    }
  }

  function setNightMode(enabled) {
    isNightMode = enabled;
    if (enabled) {
      map.removeLayer(dayTile);
      nightTile.addTo(map);
    } else {
      map.removeLayer(nightTile);
      dayTile.addTo(map);
    }
  }

  function toggleTraffic() {
    trafficVisible = !trafficVisible;
    const bar = document.getElementById('trafficBar');
    if (trafficVisible) {
      bar.style.opacity = '1';
    } else {
      bar.style.opacity = '0';
    }
    return trafficVisible;
  }

  function updateETA(minutes, distance, unit) {
    const el = document.getElementById('eta-display');
    if (el) {
      el.innerHTML = '<div style="display:flex;gap:16px;align-items:center">' +
        '<div><div style="font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:1px">ARRIVAL</div>' +
        '<div style="font-size:20px;font-weight:bold;color:#60a5fa">' + minutes + ' min</div></div>' +
        '<div style="width:1px;height:28px;background:rgba(255,255,255,0.08)"></div>' +
        '<div><div style="font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:1px">DISTANCE</div>' +
        '<div style="font-size:16px;font-weight:600;color:#e2e8f0">' + distance + ' ' + unit + '</div></div></div>';
    }
  }
</script>
</body>
</html>
